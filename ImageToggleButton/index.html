<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Toggle Button</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <p class="description">Click the button to toggle the image</p>
      <div class="img-wrapper">
        <img id="toggle-img" src="dog.jpg" alt="dog" class="dog-image hidden" />
      </div>
      <button class="toggle-btn">Show Image</button>
    </div>
    <script src="index.js"></script>
  </body>
</html>
